name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        name: [linux, windows, macos]
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Install Python tooling
      run: python -m pip install --upgrade pip maturin pytest
    - name: Build and install tverilog native extension
      run: |
        maturin build -m tverilog/native/Cargo.toml --release --interpreter python
        python -m pip install --force-reinstall tverilog/native/target/wheels/*.whl
    - name: Install tverilog Python package
      run: python -m pip install -e tverilog
    - name: Run tverilog Python tests
      run: cd tverilog && python -m pytest tests -q
