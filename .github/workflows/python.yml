name: Python

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python tooling
        run: python -m pip install --upgrade pip maturin pytest

      - name: Build and install tverilog native extension
        run: |
          maturin build -m tverilog/native/Cargo.toml --release --interpreter python
          python -c 'import glob, os, subprocess, sys; wheels = sorted(glob.glob(os.path.join("tverilog", "native", "target", "wheels", "*.whl"))); print("Wheels:", wheels); assert wheels, "No wheel files found"; subprocess.check_call([sys.executable, "-m", "pip", "install", "--force-reinstall", *wheels])'

      - name: Install tverilog Python package
        run: python -m pip install -e tverilog

      - name: Run tverilog tests
        run: cd tverilog && python -m pytest tests -q
